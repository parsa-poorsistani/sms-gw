apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-gw
  namespace: sms-gw
  labels:
    app: sms-gw
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sms-gw
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sms-gw
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      # Give in-flight deliveries time to finish before SIGKILL.
      # (Pairs with the graceful-drain fix in the review: finalization writes
      # should use context.WithoutCancel so outcomes are always recorded.)
      terminationGracePeriodSeconds: 30
      containers:
        - name: sms-gw
          image: sms-gw:local
          imagePullPolicy: Never   # built inside minikube's docker daemon
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: sms-gw-config
          env:
            - name: SMS_GW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: SMS_GW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          # Liveness: process is up. Kept dumb on purpose — a DB outage must
          # not make kubelet kill pods that can't fix the DB by restarting.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          # Readiness: /readyz pings the DB; unready pods leave the Service.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sms-gw
  namespace: sms-gw
spec:
  selector:
    app: sms-gw
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Keep at least one replica during voluntary disruptions (node drain, upgrades).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sms-gw
  namespace: sms-gw
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sms-gw
